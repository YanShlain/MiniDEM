spring.application.name=event-generator
server.port=8081

# Where the collector's ingestion endpoint lives.
minidem.ingest.base-url=http://localhost:8080

# The site codes this "agent fleet" pretends to be. Must match the codes ingest-service's
# DataSeeder seeds (Phase 1) -- there's no discovery mechanism between the two services yet,
# so this list is duplicated by hand. A real fleet would register itself or be configured
# from the same source of truth; noted as a simplification for this session.
minidem.generator.site-codes=tel-aviv-office,berlin-office,nyc-branch,singapore-pop,aws-us-east-1,aws-eu-west-1

# How often (ms) to generate and send one event.
minidem.generator.interval-ms=5000
